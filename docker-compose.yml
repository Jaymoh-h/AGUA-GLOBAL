services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agua_global}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/database/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./server/database/seed.sql:/docker-entrypoint-initdb.d/002_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-agua_global}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./server
    restart: unless-stopped
    environment:
      PORT: 5000
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-agua_global}
      DATABASE_SSL: "false"
      DATABASE_SSL_REJECT_UNAUTHORIZED: "false"
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-before-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      CRON_SECRET: ${CRON_SECRET:-change-this-separate-cron-secret}
      REMINDER_CRON_SECRET: ${REMINDER_CRON_SECRET:-}
      MONITORING_CRON_SECRET: ${MONITORING_CRON_SECRET:-}
      MONITORING_ALERT_EMAILS: ${MONITORING_ALERT_EMAILS:-}
      MONITORING_ALERT_PHONES: ${MONITORING_ALERT_PHONES:-}
      MONITORING_ALERT_WINDOW_MINUTES: ${MONITORING_ALERT_WINDOW_MINUTES:-15}
      MONITORING_ALERT_COOLDOWN_MINUTES: ${MONITORING_ALERT_COOLDOWN_MINUTES:-60}
      PUBLIC_STATUS_URL: ${PUBLIC_STATUS_URL:-}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:5173}
      API_RATE_LIMIT_WINDOW_MS: ${API_RATE_LIMIT_WINDOW_MS:-900000}
      API_RATE_LIMIT_MAX: ${API_RATE_LIMIT_MAX:-600}
      API_RATE_LIMIT_STORE: ${API_RATE_LIMIT_STORE:-memory}
      AUTH_RATE_LIMIT_WINDOW_MS: ${AUTH_RATE_LIMIT_WINDOW_MS:-900000}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-20}
      AUTH_RATE_LIMIT_STORE: ${AUTH_RATE_LIMIT_STORE:-database}
      RATE_LIMIT_HASH_SECRET: ${RATE_LIMIT_HASH_SECRET:-}
      LOGO_STORAGE_MODE: filesystem
      BACKUP_DIR: /app/backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-180}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMS_PROVIDER: ${SMS_PROVIDER:-none}
      SMS_DEFAULT_COUNTRY_CODE: ${SMS_DEFAULT_COUNTRY_CODE:-254}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      TWILIO_MESSAGING_SERVICE_SID: ${TWILIO_MESSAGING_SERVICE_SID:-}
      AT_USERNAME: ${AT_USERNAME:-}
      AT_API_KEY: ${AT_API_KEY:-}
      AT_SENDER_ID: ${AT_SENDER_ID:-}
      WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-none}
      WHATSAPP_DEFAULT_COUNTRY_CODE: ${WHATSAPP_DEFAULT_COUNTRY_CODE:-254}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-}
      WHATSAPP_TWILIO_ACCOUNT_SID: ${WHATSAPP_TWILIO_ACCOUNT_SID:-}
      WHATSAPP_TWILIO_AUTH_TOKEN: ${WHATSAPP_TWILIO_AUTH_TOKEN:-}
      WHATSAPP_TWILIO_FROM: ${WHATSAPP_TWILIO_FROM:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION:-v20.0}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-5000}:5000"
    volumes:
      - api_uploads:/app/public/uploads
      - document_storage:/app/storage/documents
      - api_backups:/app/backups
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/api/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${CLIENT_PORT:-5173}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  api_uploads:
  document_storage:
  api_backups:
